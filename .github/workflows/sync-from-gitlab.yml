name: Sync from GitLab

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add GitLab upstream remote
        run: |
          git remote add upstream https://gitlab.com/kalilinux/nethunter/apps/kali-nethunter-app.git || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream default branch into main
        run: |
          git checkout main
          # -X theirs resolves conflicts by preferring upstream changes.
          # --allow-unrelated-histories handles first-time syncs.
          # If the GitLab default branch differs from 'main', update the ref below.
          git merge upstream/main -X theirs --allow-unrelated-histories \
            -m "chore: sync from GitLab upstream"

      - name: Push changes to GitHub
        # Only push when there are commits ahead of the remote to avoid
        # a no-op push (which succeeds but wastes API calls).
        run: |
          if git diff --quiet origin/main; then
            echo "Nothing to push, already up to date."
          else
            git push origin main
          fi
